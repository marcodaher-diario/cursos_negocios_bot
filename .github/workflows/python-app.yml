name: Execucao Diaria do Bot

on:
  schedule:
    # Roda de hora em hora (00:00, 01:00, etc. no horário UTC)
    # Como seu script tem a janela de 60 min, ele vai encontrar o horário de Brasília correto.
    - cron: '0 * * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite que você rode manualmente clicando em um botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Rodar Bot de Cursos e Negocios
      env:
        # Aqui conectamos o código às chaves que você salvou no GitHub Secrets
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BLOGGER_TOKEN_BASE64: ${{ secrets.BLOGGER_TOKEN_BASE64 }}
      run: python run_bot.py
